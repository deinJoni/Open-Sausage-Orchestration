specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: OsopitRegistry
    network: base
    source:
      abi: OsopitRegistry
      address: "0x63e7b8F8A8d42b043fe58Be1243d7cBcb1Ca5514"
      startBlock: 37817657
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - NameRegistered
      abis:
        - name: OsopitRegistry
          file: ./abis/OsopitRegistry.json
      eventHandlers:
        - event: NameRegistered(string,address)
          handler: handleNameRegistered
      file: ./src/osopit-registry.ts
  - kind: ethereum
    name: L2Resolver
    network: base
    source:
      abi: ITextResolver
      address: "0xa609955257eacbbd566a1fa654e6c5f4b1fdc9e2"
      startBlock: 37817657
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - User
        - NameLabel
      abis:
        - name: ITextResolver
          file: ./abis/ITextResolver.json
      eventHandlers:
        - event: TextChanged(indexed bytes32,indexed string,string,string)
          handler: handleTextChanged
      file: ./src/l2-resolver.ts
