specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: OsopitRegistry
    network: base
    source:
      abi: OsopitRegistry
      address: "0x68f1F95f8896Fd793Af7C91F9D63BCF0912a1FDf"
      startBlock: 45373904
    context:
      parentDomain:
        type: String
        data: "deinjoni.eth"
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - NameRegistered
      abis:
        - name: OsopitRegistry
          file: ./abis/OsopitRegistry.json
      eventHandlers:
        - event: NameRegistered(indexed string,indexed address)
          handler: handleNameRegistered
      file: ./src/osopit-registry.ts
  - kind: ethereum
    name: L2Resolver
    network: base
    source:
      abi: ITextResolver
      address: "0x58e196c108a1bc7d27c46f1ed7fa24401a56eecf"
      startBlock: 45373904
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - User
        - NameLabel
      abis:
        - name: ITextResolver
          file: ./abis/ITextResolver.json
      eventHandlers:
        - event: TextChanged(indexed bytes32,indexed string,string,string)
          handler: handleTextChanged
      file: ./src/l2-resolver.ts
