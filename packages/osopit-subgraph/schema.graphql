type Subdomain @entity(immutable: false) {
  id: ID! # node hash (bytes32 as hex string)
  node: Bytes! # ENS node (bytes32)
  name: String! # readable subdomain name (e.g., "alice" or full "alice.osopit.eth")
  owner: User! # wallet that owns this subdomain
  nameLabels: [NameLabel!]! @derivedFrom(field: "subdomain")
  registeredAt: BigInt!
  updatedAt: BigInt!
  registrationTxHash: Bytes!
}

type NameLabel @entity(immutable: false) {
  id: ID! #key-nodeHex to allow updates for the same key
  key: String! # "avatar" "description" "email" "url" "header" "com.twitter" "com.github" "com.discord" "com.telegram" "social.farcaster" "social.lens" "livestream.url" "livestream.active" "art1" through "art8"
  value: String! # url, text, boolean, etc.
  subdomain: Subdomain! # relation to Subdomain
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
  logIndex: BigInt!
}