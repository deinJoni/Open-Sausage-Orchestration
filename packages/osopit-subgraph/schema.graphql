type User @entity(immutable: false) {
  id: ID! # wallet address (lowercase hex)
  address: Bytes! # wallet address
  subdomains: [Subdomain!]! @derivedFrom(field: "owner")
  isStreaming: Boolean! # if we detect that user setText with key "app.osopit.streaming" then update this to the value (either true or false)
  streamingUrl: String! # if we detect that user setText with key "app.osopit.streaming" then update this to the value (either true or false)
  streamingWith: [String!]! # array of user IDs that are streaming with this user 
  createdAt: BigInt!
  updatedAt: BigInt!
}

