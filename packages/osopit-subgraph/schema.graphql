type User @entity(immutable: false) {
  id: ID! # wallet address (lowercase hex)
  address: Bytes! # wallet address
  subdomain: Subdomain! # the subdomain that this user owns
  activeBroadcast: Broadcast # current live broadcast (nullable)
  broadcasts: [Broadcast!]! @derivedFrom(field: "user") # all broadcasts by this user
  participatedIn: [Broadcast!]! @derivedFrom(field: "broadcastWith") # broadcasts this user participated in as guest
  createdAt: BigInt!
  updatedAt: BigInt!
}

type Subdomain @entity(immutable: false) {
  id: ID! # node hash (bytes32 as hex string)
  node: Bytes! # ENS node (bytes32)
  name: String! # readable subdomain name (e.g., "alice" or full "alice.osopit.eth")
  owner: User! # wallet that owns this subdomain
  textRecords: [TextRecord!]! @derivedFrom(field: "subdomain")
  registeredAt: BigInt!
  registrationTxHash: Bytes!
  updatedAt: BigInt!
}

type TextRecord @entity(immutable: false) {
  id: ID! #key-nodeHex to allow updates for the same key
  key: String! # "avatar" "description" "email" "url" "header" "com.twitter" "com.github" "com.discord" "com.telegram" "social.farcaster" "social.lens" "art1" through "art8"
  value: String! # url, text, boolean, etc.
  subdomain: Subdomain! # relation to Subdomain
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
  logIndex: BigInt!
  createdAt: BigInt!
  updatedAt: BigInt!
}


# Broadcast tracking
# TextChanged event with key "app.osopit.broadcast" and value format: "true|url|userId1|userId2|..."
# - When isLive=true: creates new broadcast, sets User.activeBroadcast
# - When isLive=false: updates existing broadcast (isLive=false, endedAt), clears User.activeBroadcast
type Broadcast @entity(immutable: false) {
  id: ID! # subdomain.id + startedAt timestamp
  isLive: Boolean!
  user: User!
  broadcastUrl: String!
  broadcastWith: [User!]! # guest users participating in the broadcast
  startedAt: BigInt!
  endedAt: BigInt # nullable - set when broadcast ends
  transactionHash: Bytes!
  logIndex: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}