type User @entity(immutable: true) {
  id: Bytes!
  subdomain: String! # string
  address: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type NameLabel @entity(immutable: true) {
  id: Bytes!
  key: String! # string "avatar" "description" "email" "url" "header" "com.twitter" "com.github" "com.discord" "com.telegram" "social.farcaster" "social.lens" "livestream.url" "livestream.active" "art1" "art2" "art3" "art4" "art5" "art6" "art7" "art8"
  value: String! # string # url, text, boolean, etc.
  user: User! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}
