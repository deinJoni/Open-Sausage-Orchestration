specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: OsopitRegistry
    network: base
    source:
      address: "0xa05914349B2E251Ed45dC29Ae9aEF59028Be6f8f"
      abi: OsopitRegistry
      startBlock: 37818889
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - NameRegistered
      abis:
        - name: OsopitRegistry
          file: ./abis/OsopitRegistry.json
      eventHandlers:
        - event: NameRegistered(string,indexed address)
          handler: handleNameRegistered
      file: ./src/osopit-registry.ts
  - kind: ethereum
    name: L2Resolver
    network: base
    source:
      address: "0xa609955257eacbbd566a1fa654e6c5f4b1fdc9e2"
      abi: ITextResolver
      startBlock: 37818889
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - User
        - NameLabel
      abis:
        - name: ITextResolver
          file: ./abis/ITextResolver.json
      eventHandlers:
        - event: TextChanged(indexed bytes32,indexed string,string,string)
          handler: handleTextChanged
      file: ./src/l2-resolver.ts
