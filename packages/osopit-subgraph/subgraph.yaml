specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: OsopitRegistry
    network: base
    source:
      address: "0xd1F76f91C7536a360a4CBBc108928Bd85F97E1f9"
      abi: OsopitRegistry
      startBlock: 37844974
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - NameRegistered
      abis:
        - name: OsopitRegistry
          file: ./abis/OsopitRegistry.json
      eventHandlers:
        - event: NameRegistered(string,address)
          handler: handleNameRegistered
      file: ./src/osopit-registry.ts
  - kind: ethereum
    name: L2Resolver
    network: base
    source:
      address: "0xA609955257EACbBD566A1fa654E6C5f4b1fdc9e2"
      abi: ITextResolver
      startBlock: 37844974
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - User
        - NameLabel
      abis:
        - name: ITextResolver
          file: ./abis/ITextResolver.json
      eventHandlers:
        - event: TextChanged(indexed bytes32,indexed string,string,string)
          handler: handleTextChanged
      file: ./src/l2-resolver.ts
