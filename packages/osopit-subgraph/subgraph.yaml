specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: OsopitRegistry
    network: base
    source:
      address: "0x92f90070Ff34f8Bb9500bE301Ea373217673FDE4"
      abi: OsopitRegistry
      startBlock: 37748560
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - NameRegistered
      abis:
        - name: OsopitRegistry
          file: ./abis/OsopitRegistry.json
      eventHandlers:
        - event: NameRegistered(string,indexed address)
          handler: handleNameRegistered
      file: ./src/osopit-registry.ts
